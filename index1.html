<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff0000, #000000, #ffffff); /* Changed to red-black-white for error page */
        }
        .card {
            width: 50vw;
            height: auto;
            background-color: rgba(255, 255, 255, 0.9);
            color: #000;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .card h1 {
            font-size: 2rem;
            font-style: italic;
            color: #ff0000;
            font-weight: 900;
            text-shadow: 0 3px 0 #000;
            text-transform: capitalize;
        }
        .card button {
            padding: 10px 20px;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            background-color: #606060;
            border: 2px solid #fff;
            border-radius: 5px;
            box-shadow: 0 3px 0 #000;
            cursor: pointer;
            margin-top: 20px;
        }
        .card button:hover {
            background-color: #fff;
            color: #000;
            border: 2px solid transparent;
            transition: all 0.3s ease-in;
        }
        .card a {
            text-decoration: none;
            color: #fff;
        }
        .card a:hover {
            color: #000;
            transition: all 0.3s ease;
        }
        .card p {
            font-size: 18px;
            font-weight: 500;
            margin-top: 20px;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1><button><a href="./index.html">Mahama Community Center</a></button></h1>
        <p>Can't find the page you're looking for 404!</p> <!-- Changed to 404 for not found -->
        <p>This page is an error page for the Mahama Community Center website. It appears when a user tries to access a non-existent page. The button above links back to the main website.</p>
    </div>
</body>
</html>>
