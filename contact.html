<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="./contact.css">
</head>
<body>
    <section class="contact" id="contact">
        <div class="image">
            <img src="./image/576125964_858169786543713_2864301897074342238_n.jpg" alt="profile">
        </div>
        <section class="card">
            <h1>📞conact me:</h1>
            <div class="card1">
                <form action="" id="form">
                <input type="text" name="name" id="name" placeholder="enter your full name">
            </div><br>
            <div class="card2">
                <input type="text" name="email" id="email" placeholder="enter your Email">
            </div><br>
            <div class="card3">
                <input type="password" name="password" id="password" placeholder="enter your password">
            </div><br>
            <div class="card4">
                <textarea name="message" id="message" placeholder="type here your message..."></textarea>
            </div>
            <div class="btn" id="button">
                <button type="submit">submit</button>
                <button type="reset">reset</button>
            </div>
            </form>
        </section>
        <div class="back">
            <a href="./team.html"><button type="button" id="back">previous</button></a>
        </div>
    </section>
    <script src="./contact.js"></script>
</body>
</html>
